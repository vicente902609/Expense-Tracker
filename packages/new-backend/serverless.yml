service: expense-tracker-backend

useDotenv: true

plugins:
  - serverless-esbuild
  - serverless-offline

provider:
  name: aws
  runtime: nodejs20.x
  stage: ${opt:stage, 'dev'}
  region: ${opt:region, 'us-east-1'}
  environment:
    STAGE: ${self:provider.stage}
    TABLE_NAME: expense-tracker-${self:provider.stage}
    JWT_SECRET: ${env:JWT_SECRET}
    REFRESH_TOKEN_SECRET: ${env:REFRESH_TOKEN_SECRET}
  httpApi:
    cors: true
  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - dynamodb:GetItem
            - dynamodb:PutItem
            - dynamodb:UpdateItem
            - dynamodb:DeleteItem
            - dynamodb:Query
            - dynamodb:Scan
          Resource:
            - !GetAtt ExpenseTrackerTable.Arn
            - !Sub '${ExpenseTrackerTable.Arn}/index/*'

functions:
  # ── Auth ──────────────────────────────────────────────────────────────────
  authRegister:
    handler: src/handlers/auth/register.handler
    events:
      - httpApi:
          method: POST
          path: /auth/register
  authLogin:
    handler: src/handlers/auth/login.handler
    events:
      - httpApi:
          method: POST
          path: /auth/login
  authRefresh:
    handler: src/handlers/auth/refresh.handler
    events:
      - httpApi:
          method: POST
          path: /auth/refresh
  authLogout:
    handler: src/handlers/auth/logout.handler
    events:
      - httpApi:
          method: POST
          path: /auth/logout

  # ── Categories ────────────────────────────────────────────────────────────
  categoriesList:
    handler: src/handlers/categories/list.handler
    events:
      - httpApi:
          method: GET
          path: /categories
  categoriesCreate:
    handler: src/handlers/categories/create.handler
    events:
      - httpApi:
          method: POST
          path: /categories

custom:
  esbuild:
    bundle: true
    minify: false
    sourcemap: false
    target: node20
    platform: node
    concurrency: 10
    external:
      - '@aws-sdk/*'
  serverless-offline:
    httpPort: 3001
    noPrependStageInUrl: true

resources:
  Resources:
    ExpenseTrackerTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:provider.environment.TABLE_NAME}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: PK
            AttributeType: S
          - AttributeName: SK
            AttributeType: S
          - AttributeName: GSI1PK
            AttributeType: S
          - AttributeName: GSI1SK
            AttributeType: S
          - AttributeName: GSI2PK
            AttributeType: S
          - AttributeName: GSI2SK
            AttributeType: S
          - AttributeName: GSI3PK
            AttributeType: S
          - AttributeName: GSI3SK
            AttributeType: S
        KeySchema:
          - AttributeName: PK
            KeyType: HASH
          - AttributeName: SK
            KeyType: RANGE
        GlobalSecondaryIndexes:
          - IndexName: GSI1-EmailIndex
            KeySchema:
              - AttributeName: GSI1PK
                KeyType: HASH
              - AttributeName: GSI1SK
                KeyType: RANGE
            Projection:
              ProjectionType: ALL
          - IndexName: GSI2-UserExpenseDateIndex
            KeySchema:
              - AttributeName: GSI2PK
                KeyType: HASH
              - AttributeName: GSI2SK
                KeyType: RANGE
            Projection:
              ProjectionType: ALL
          - IndexName: GSI3-UserCategoryDateIndex
            KeySchema:
              - AttributeName: GSI3PK
                KeyType: HASH
              - AttributeName: GSI3SK
                KeyType: RANGE
            Projection:
              ProjectionType: ALL
        TimeToLiveSpecification:
          AttributeName: expiresAt
          Enabled: true
